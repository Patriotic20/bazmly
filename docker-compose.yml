services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: bazmly
      POSTGRES_PASSWORD: bazmly
      POSTGRES_DB: bazmly
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bazmly"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
